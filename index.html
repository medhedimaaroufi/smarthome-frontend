<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Casa — Smart Home | Active Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.5/mqtt.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --text: #e8eaf0;
      --muted: #5a6078;
      --on: #30d46a;
      --on-glow: rgba(48, 212, 106, 0.28);
      --off: #2a2f40;
      --red: #ff4558;
      --red-glow: rgba(255, 69, 88, 0.18);
      --amber: #f5a623;
      --radius: 16px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.5;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 env(safe-area-inset-bottom, 24px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
    }

    .wordmark {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .wordmark span {
      -webkit-text-fill-color: var(--on);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #conn-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .02em;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all .3s ease;
    }

    #conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
    }

    #conn-pill.connected {
      border-color: var(--on);
      background: rgba(48, 212, 106, 0.08);
    }

    #conn-pill.connected #conn-dot {
      background: var(--on);
      box-shadow: 0 0 6px var(--on);
    }

    #conn-pill.connecting {
      border-color: var(--amber);
      background: rgba(245, 166, 35, 0.08);
    }

    #conn-pill.connecting #conn-dot {
      background: var(--amber);
      animation: pulse 1s infinite;
    }

    #conn-pill.disconnected {
      border-color: var(--red);
      background: var(--red-glow);
    }

    #conn-pill.disconnected #conn-dot {
      background: var(--red);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    #gear-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      font-size: 17px;
    }

    #gear-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    #gear-btn:active {
      transform: scale(.93);
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 20px;
      margin: 20px 0 10px;
    }

    .device-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: border-color .25s, box-shadow .25s, transform .12s, background .25s;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .35), inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(ellipse at 30% 0%, rgba(255, 255, 255, .05) 0%, transparent 65%);
      pointer-events: none;
    }

    .card.on {
      border-color: rgba(48, 212, 106, .4);
      background: rgba(48, 212, 106, .06);
      box-shadow: 0 4px 0 rgba(0, 0, 0, .35), 0 0 28px var(--on-glow), inset 0 1px 0 rgba(48, 212, 106, .12);
    }

    .card:active {
      transform: translateY(3px) scale(.985);
      box-shadow: 0 1px 0 rgba(0, 0, 0, .35);
    }

    .card.optimistic {
      opacity: 0.7;
      transition: opacity 0.15s ease;
    }

    .card.optimistic .status-dot {
      animation: pulseOptimistic 1s infinite;
    }

    @keyframes pulseOptimistic {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(0.9);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .card-icon {
      font-size: 26px;
      line-height: 1;
      filter: grayscale(1) brightness(.4);
      transition: filter .3s;
    }

    .card.on .card-icon {
      filter: none;
    }

    .card-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
      transition: background .25s, box-shadow .25s;
    }

    .card.on .status-dot {
      background: var(--on);
      box-shadow: 0 0 6px var(--on);
    }

    .status-text {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--muted);
      transition: color .25s;
    }

    .card.on .status-text {
      color: var(--on);
    }

    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, .65);
      backdrop-filter: blur(6px);
      align-items: flex-end;
    }

    #settings-overlay.open {
      display: flex;
    }

    #settings-panel {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border);
      padding: 8px 0 0;
      animation: slideUp .3s cubic-bezier(.32, 1, .32, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 8px auto 20px;
    }

    .panel-title {
      font-size: 17px;
      font-weight: 700;
      padding: 0 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 11px 13px;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }

    .field input:focus {
      border-color: var(--on);
    }

    .panel-actions {
      padding: 0 20px 28px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-cancel {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-save {
      background: var(--on);
      color: #000;
    }

    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 200;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    footer {
      text-align: center;
      padding: 28px 20px 20px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--border);
      letter-spacing: .06em;
    }

    .sync-badge {
      font-size: 9px;
      margin-left: 6px;
      font-family: monospace;
      background: rgba(48, 212, 106, 0.2);
      padding: 2px 5px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="wordmark">casa<span>.</span></div>
    <div class="header-right">
      <div id="conn-pill" class="disconnected">
        <div id="conn-dot"></div>
        <span id="conn-label">offline</span>
        <span id="sync-badge" class="sync-badge">⏳</span>
      </div>
      <button id="gear-btn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="section-label">Lights</div>
  <div class="device-grid" id="interactive-grid"></div>

  <div class="section-label">Outdoor &amp; Pool</div>
  <div class="device-grid" id="remote-grid"></div>

  <footer>⚡ real-time sync every 5s & after each action · <span id="sync-timestamp">—</span></footer>
</div>

<div id="settings-overlay" role="dialog" aria-modal="true">
  <div id="settings-panel">
    <div class="panel-handle"></div>
    <div class="panel-title">Connection Settings</div>
    <div class="panel-body">
      <div class="field">
        <label>Broker URL (wss://)</label>
        <input id="s-url" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label>Topic Prefix</label>
        <input id="s-prefix" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label>Username</label>
        <input id="s-user" type="text" autocomplete="off">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="s-pass" type="password" autocomplete="off">
      </div>
    </div>
    <div class="panel-actions">
      <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn btn-save" id="save-btn">Save &amp; Connect</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
  // ---------- DEVICE DEFINITIONS ----------
  const INTERACTIVE = [
    { id: 'light1', name: 'Living Room', icon: '💡' },
    { id: 'light2', name: 'Kitchen', icon: '💡' },
    { id: 'light3', name: 'Bedroom', icon: '🌙' },
    { id: 'light4', name: 'Hallway', icon: '🏠' },
    { id: 'light5', name: 'Bathroom', icon: '🚿' },
    { id: 'light6', name: 'Garage', icon: '🚗' },
  ];
  const REMOTE = [
    { id: 'pump1', name: 'Pool Pump', icon: '🌊' },
    { id: 'tree_light', name: 'Tree Light', icon: '🌳' },
    { id: 'jacuzzi', name: 'Jacuzzi', icon: '♨️' },
    { id: 'wall_light', name: 'Wall Light', icon: '🔆' },
  ];
  const ALL_DEVICES = [...INTERACTIVE, ...REMOTE];

  // ---------- DEFAULTS ----------
  const DEFAULTS = {
    url: 'wss://f2cc1208.ala.eu-central-1.emqxsl.com:8084/mqtt',
    prefix: 'smarthome/controller1',
    user: '',
    pass: '',
  };

  // ---------- GLOBALS ----------
  let client = null;
  let deviceState = {};        // id -> 'ON'/'OFF'
  let optimisticTimers = {};
  let periodicSyncInterval = null;
  let isConnected = false;

  // DOM elements
  const interactiveGrid = document.getElementById('interactive-grid');
  const remoteGrid = document.getElementById('remote-grid');
  const connPill = document.getElementById('conn-pill');
  const connLabel = document.getElementById('conn-label');
  const syncBadgeSpan = document.getElementById('sync-badge');
  const syncTimestampSpan = document.getElementById('sync-timestamp');
  const toastEl = document.getElementById('toast');

  // helpers
  function showToast(msg, duration = 2200) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._hideTimer);
    toastEl._hideTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
  }

  function setConnectionStatus(status) {
    connPill.className = status;
    isConnected = (status === 'connected');
    if (status === 'connected') {
      connLabel.textContent = 'online';
      syncBadgeSpan.textContent = '✓ live';
      syncBadgeSpan.style.background = 'rgba(48,212,106,0.25)';
    } else if (status === 'connecting') {
      connLabel.textContent = 'connecting…';
      syncBadgeSpan.textContent = '⟳';
      syncBadgeSpan.style.background = 'rgba(245,166,35,0.2)';
    } else {
      connLabel.textContent = 'offline';
      syncBadgeSpan.textContent = '⚠';
      syncBadgeSpan.style.background = 'rgba(255,69,88,0.2)';
    }
  }

  function updateSyncTimestamp() {
    const now = new Date();
    syncTimestampSpan.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ---------- CARD RENDERING ----------
  function updateSingleCard(id, isOn) {
    const card = document.getElementById(`card-${id}`);
    const badge = document.getElementById(`badge-${id}`);
    if (!card) return;
    card.classList.toggle('on', isOn);
    card.classList.remove('optimistic');
    card.setAttribute('aria-pressed', isOn ? 'true' : 'false');
    if (badge) badge.textContent = isOn ? 'ON' : 'OFF';
    const statusDot = card.querySelector('.status-dot');
    if (statusDot) {
      if (isOn) {
        statusDot.style.background = '#30d46a';
        statusDot.style.boxShadow = '0 0 6px #30d46a';
      } else {
        statusDot.style.background = '#5a6078';
        statusDot.style.boxShadow = 'none';
      }
    }
  }

  function createCard(device, isOn) {
    const div = document.createElement('div');
    div.className = `card${isOn ? ' on' : ''}`;
    div.id = `card-${device.id}`;
    div.setAttribute('role', 'button');
    div.setAttribute('aria-pressed', isOn ? 'true' : 'false');
    div.innerHTML = `
      <div class="card-icon">${device.icon}</div>
      <div class="card-name">${device.name}</div>
      <div class="card-status">
        <div class="status-dot"></div>
        <span class="status-text" id="badge-${device.id}">${isOn ? 'ON' : 'OFF'}</span>
      </div>`;
    div.addEventListener('click', (e) => {
      e.stopPropagation();
      const current = deviceState[device.id] === 'ON';
      handleToggle(device.id, !current);
    });
    return div;
  }

  function renderAllGrids() {
    interactiveGrid.innerHTML = '';
    remoteGrid.innerHTML = '';
    INTERACTIVE.forEach(dev => {
      const isOn = deviceState[dev.id] === 'ON';
      interactiveGrid.appendChild(createCard(dev, isOn));
    });
    REMOTE.forEach(dev => {
      const isOn = deviceState[dev.id] === 'ON';
      remoteGrid.appendChild(createCard(dev, isOn));
    });
  }

  // ---------- CORE: FULL STATE SYNC FROM TOPIC smarthome/controller1/devices/state/all ----------
  function applyFullStateSnapshot(payloadStr, source = 'mqtt') {
    try {
      const data = typeof payloadStr === 'string' ? JSON.parse(payloadStr) : payloadStr;
      if (!data || typeof data !== 'object') return false;
      let changes = 0;
      for (const dev of ALL_DEVICES) {
        const id = dev.id;
        if (data.hasOwnProperty(id)) {
          const raw = data[id];
          const newState = (String(raw).toUpperCase() === 'ON') ? 'ON' : 'OFF';
          const oldState = deviceState[id];
          if (oldState !== newState) {
            deviceState[id] = newState;
            updateSingleCard(id, newState === 'ON');
            changes++;
          }
          // clear any pending optimistic timer for this device (broker is source of truth)
          if (optimisticTimers[id]) {
            clearTimeout(optimisticTimers[id]);
            delete optimisticTimers[id];
          }
        }
      }
      if (changes > 0 && source !== 'periodic') {
        showToast(`🔄 synced ${changes} change${changes !== 1 ? 's' : ''}`, 1200);
      } else if (source === 'periodic' && changes === 0) {
        // silent keep-alive
      }
      updateSyncTimestamp();
      return true;
    } catch (err) {
      console.warn('Snapshot parse error', err);
      return false;
    }
  }

  // MANUAL / PERIODIC FETCH: PUBLISH TO "devices/state/getAll" (triggers ESP32 to re-publish retained state)
  function requestFullStateSnapshot() {
    if (!client || !client.connected) {
      if (isConnected === false) return;
      return;
    }
    const cfg = loadConfig();
    const getAllTopic = `${cfg.prefix}/devices/state/getAll`;
    client.publish(getAllTopic, '', { qos: 0, retain: true }, (err) => {
      if (err) console.warn('getAll publish error', err);
      else console.log('📡 Requested fresh full state snapshot');
    });
  }

  // ---------- MQTT TOGGLE + optimistic + AFTER ACTION SYNC ----------
  function handleToggle(id, desiredOn) {
    const cfg = loadConfig();
    const newState = desiredOn ? 'ON' : 'OFF';
    const oldState = deviceState[id] || 'OFF';

    // optimistic UI
    deviceState[id] = newState;
    updateSingleCard(id, desiredOn);
    const cardEl = document.getElementById(`card-${id}`);
    if (cardEl) cardEl.classList.add('optimistic');

    // revert timer
    clearTimeout(optimisticTimers[id]);
    optimisticTimers[id] = setTimeout(() => {
      if (deviceState[id] === newState) {
        deviceState[id] = oldState;
        updateSingleCard(id, oldState === 'ON');
        showToast(`⚠ ${id} timeout — reverted`, 2000);
        delete optimisticTimers[id];
      }
    }, 3500);

    if (client && client.connected) {
      const topic = `${cfg.prefix}/devices/${id}/set`;
      const payload = JSON.stringify({ state: newState });
      client.publish(topic, payload, { qos: 0 }, (err) => {
        if (err) {
          showToast(`Publish failed: ${err.message}`);
          if (optimisticTimers[id]) clearTimeout(optimisticTimers[id]);
          deviceState[id] = oldState;
          updateSingleCard(id, oldState === 'ON');
          delete optimisticTimers[id];
        } else {
          // ✅ AFTER EVERY ACTION: force a fresh full-state sync
          // This guarantees screen reflects the exact broker state after command is processed.
          setTimeout(() => {
            requestFullStateSnapshot();
          }, 150);
        }
      });
    } else {
      showToast('No MQTT connection — command pending');
      setTimeout(() => {
        if (deviceState[id] === newState && (!client || !client.connected)) {
          deviceState[id] = oldState;
          updateSingleCard(id, oldState === 'ON');
          delete optimisticTimers[id];
        }
      }, 2000);
    }
  }

  // ---------- MQTT SETUP & SUBSCRIPTIONS ----------
  function connectMqtt() {
    if (client) {
      try { client.end(true); } catch (e) { }
      client = null;
    }
    const cfg = loadConfig();
    setConnectionStatus('connecting');

    const opts = {
      keepalive: 30,
      connectTimeout: 10000,
      reconnectPeriod: 5000,
      clean: true,
      clientId: `casa_dash_${Math.random().toString(36).substr(2, 8)}`
    };
    if (cfg.user) opts.username = cfg.user;
    if (cfg.pass) opts.password = cfg.pass;

    try {
      client = mqtt.connect(cfg.url, opts);
    } catch (e) {
      setConnectionStatus('disconnected');
      showToast(`Connection error: ${e.message}`);
      return;
    }

    client.on('connect', () => {
      setConnectionStatus('connected');
      const stateAllTopic = `${cfg.prefix}/devices/state/all`;
      const perDeviceTopic = `${cfg.prefix}/devices/+/state`;

      client.subscribe(stateAllTopic, { qos: 0 }, (err) => {
        if (err) console.warn('Subscribe all error', err);
        else console.log(`✅ Subscribed to ${stateAllTopic}`);
      });
      client.subscribe(perDeviceTopic, { qos: 0 }, (err) => {
        if (err) console.warn('Subscribe per-device error', err);
      });

      // Immediately request full snapshot after connect
      setTimeout(() => {
        requestFullStateSnapshot();
      }, 200);
      showToast('Connected — fetching live state', 1500);
    });

    client.on('message', (topic, message) => {
      const cfgNow = loadConfig();
      const payloadStr = message.toString();
      const fullStateTopic = `${cfgNow.prefix}/devices/state/all`;

      if (topic === fullStateTopic) {
        // This is the RETAINED / published snapshot from ESP32
        applyFullStateSnapshot(payloadStr, 'mqtt');
        return;
      }

      // per-device state update: individual confirmation
      const perDevicePattern = new RegExp(`^${escapeRegex(cfgNow.prefix)}/devices/([^/]+)/state$`);
      const match = topic.match(perDevicePattern);
      if (match) {
        const devId = match[1];
        try {
          const parsed = JSON.parse(payloadStr);
          const rawState = parsed.state;
          const isOn = (String(rawState).toUpperCase() === 'ON');
          if (optimisticTimers[devId]) {
            clearTimeout(optimisticTimers[devId]);
            delete optimisticTimers[devId];
          }
          if (deviceState[devId] !== (isOn ? 'ON' : 'OFF')) {
            deviceState[devId] = isOn ? 'ON' : 'OFF';
            updateSingleCard(devId, isOn);
          } else {
            const card = document.getElementById(`card-${devId}`);
            if (card) card.classList.remove('optimistic');
          }
        } catch (e) { /* ignore non-json */ }
        return;
      }
    });

    client.on('reconnect', () => setConnectionStatus('connecting'));
    client.on('offline', () => setConnectionStatus('disconnected'));
    client.on('error', (err) => {
      setConnectionStatus('disconnected');
      showToast(`MQTT error: ${err.message || 'unknown'}`);
    });
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ---------- PERIODIC SYNC (every 5 seconds) ----------
  function startPeriodicSync() {
    if (periodicSyncInterval) clearInterval(periodicSyncInterval);
    periodicSyncInterval = setInterval(() => {
      if (client && client.connected) {
        requestFullStateSnapshot();
        syncBadgeSpan.style.opacity = '0.7';
        setTimeout(() => { if (syncBadgeSpan) syncBadgeSpan.style.opacity = '1'; }, 300);
      } else {
        // if offline, we still try to keep badge neutral
        syncBadgeSpan.textContent = isConnected ? '✓' : '⚠';
      }
    }, 5000); // every 5 seconds exactly as requested
  }

  // ---------- CONFIG PERSISTENCE ----------
  function loadConfig() {
    try {
      const stored = JSON.parse(localStorage.getItem('casa_cfg') || '{}');
      return { ...DEFAULTS, ...stored };
    } catch {
      return { ...DEFAULTS };
    }
  }

  function saveConfig(cfg) {
    localStorage.setItem('casa_cfg', JSON.stringify(cfg));
  }

  // ---------- SETTINGS UI ----------
  const overlay = document.getElementById('settings-overlay');
  const gearBtn = document.getElementById('gear-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  const saveBtn = document.getElementById('save-btn');

  function openSettings() {
    const cfg = loadConfig();
    document.getElementById('s-url').value = cfg.url;
    document.getElementById('s-prefix').value = cfg.prefix;
    document.getElementById('s-user').value = cfg.user;
    document.getElementById('s-pass').value = cfg.pass;
    overlay.classList.add('open');
  }

  function closeSettings() {
    overlay.classList.remove('open');
  }

  gearBtn.addEventListener('click', openSettings);
  cancelBtn.addEventListener('click', closeSettings);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSettings(); });

  saveBtn.addEventListener('click', () => {
    const newCfg = {
      url: document.getElementById('s-url').value.trim() || DEFAULTS.url,
      prefix: document.getElementById('s-prefix').value.trim() || DEFAULTS.prefix,
      user: document.getElementById('s-user').value,
      pass: document.getElementById('s-pass').value,
    };
    saveConfig(newCfg);
    closeSettings();

    // reset state
    ALL_DEVICES.forEach(d => { deviceState[d.id] = 'OFF'; });
    renderAllGrids();
    Object.keys(optimisticTimers).forEach(t => clearTimeout(optimisticTimers[t]));
    optimisticTimers = {};

    connectMqtt();
    showToast('Settings saved, reconnecting…', 1800);
  });

  // ---------- BOOTSTRAP ----------
  function init() {
    ALL_DEVICES.forEach(d => { deviceState[d.id] = 'OFF'; });
    renderAllGrids();
    connectMqtt();
    startPeriodicSync();
    updateSyncTimestamp();
  }

  init();
</script>
</body>
</html>
